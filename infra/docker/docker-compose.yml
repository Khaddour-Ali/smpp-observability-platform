name: smpp-observability-platform

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-smpp}
      POSTGRES_USER: ${POSTGRES_USER:-smpp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-smpp}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\"",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${SPRING_RABBITMQ_USERNAME:-guest}
      RABBITMQ_DEFAULT_PASS: ${SPRING_RABBITMQ_PASSWORD:-guest}
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 10s
      retries: 6
      start_period: 40s

  mock-sender:
    image: wiremock/wiremock:3.3.1
    ports:
      - "8081:8080"
    volumes:
      - ./mock-sender/mappings:/home/wiremock/mappings
    command: ["--verbose"]

  jaeger:
    image: jaegertracing/all-in-one:1.57
    ports:
      - "16686:16686"
      - "4318:4318"
    environment:
      COLLECTOR_OTLP_ENABLED: "true"

  app:
    build:
      context: ../../backend
      dockerfile: ../infra/docker/Dockerfile
    ports:
      - "8080:8080"
      - "2775:2775"
    environment:
      SPRING_APPLICATION_NAME: ${SPRING_APPLICATION_NAME:-smpp-observability-platform}
      SERVER_PORT: ${SERVER_PORT:-8080}
      SMPP_SERVER_ENABLED: ${SMPP_SERVER_ENABLED:-true}
      SMPP_SERVER_HOST: ${SMPP_SERVER_HOST:-0.0.0.0}
      SMPP_SERVER_PORT: ${SMPP_SERVER_PORT:-2775}
      SMPP_SERVER_MAX_CONNECTIONS: ${SMPP_SERVER_MAX_CONNECTIONS:-256}
      SMPP_SERVER_IO_THREADS: ${SMPP_SERVER_IO_THREADS:-32}
      SMPP_SERVER_CLOSE_SCHEDULER_THREADS: ${SMPP_SERVER_CLOSE_SCHEDULER_THREADS:-1}
      SMPP_SERVER_SYSTEM_ID: ${SMPP_SERVER_SYSTEM_ID:-SMPP}
      SMPP_SERVER_ACCEPT_ANY_BIND: ${SMPP_SERVER_ACCEPT_ANY_BIND:-true}
      SMPP_SERVER_EXPECTED_SYSTEM_ID: ${SMPP_SERVER_EXPECTED_SYSTEM_ID:-}
      SMPP_SERVER_EXPECTED_PASSWORD: ${SMPP_SERVER_EXPECTED_PASSWORD:-}
      SMPP_THROTTLE_ENABLED: ${SMPP_THROTTLE_ENABLED:-true}
      SMPP_THROTTLE_MAX_TPS_PER_SYSTEM_ID: ${SMPP_THROTTLE_MAX_TPS_PER_SYSTEM_ID:-1000}
      SMPP_QUEUE_ENABLED: ${SMPP_QUEUE_ENABLED:-true}
      SMPP_QUEUE_EXCHANGE: ${SMPP_QUEUE_EXCHANGE:-smpp.direct}
      SMPP_QUEUE_NAME: ${SMPP_QUEUE_NAME:-smpp.messages.process}
      SMPP_QUEUE_ROUTING_KEY: ${SMPP_QUEUE_ROUTING_KEY:-messages.process}
      SMPP_QUEUE_HANDOFF_INTERVAL_MS: ${SMPP_QUEUE_HANDOFF_INTERVAL_MS:-500}
      SMPP_QUEUE_BATCH_SIZE: ${SMPP_QUEUE_BATCH_SIZE:-50}
      SMPP_QUEUE_DLX_EXCHANGE: ${SMPP_QUEUE_DLX_EXCHANGE:-smpp.dlx}
      SMPP_QUEUE_RETRY_ROUTING_KEY: ${SMPP_QUEUE_RETRY_ROUTING_KEY:-messages.process.retry}
      SMPP_QUEUE_DLQ_ROUTING_KEY: ${SMPP_QUEUE_DLQ_ROUTING_KEY:-messages.process.dlq}
      SMPP_QUEUE_RETRY_NAME: ${SMPP_QUEUE_RETRY_NAME:-smpp.messages.process.retry}
      SMPP_QUEUE_DLQ_NAME: ${SMPP_QUEUE_DLQ_NAME:-smpp.messages.process.dlq}
      SMPP_QUEUE_MESSAGE_RETRY_TTL_MS: ${SMPP_QUEUE_MESSAGE_RETRY_TTL_MS:-2000}
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:-jdbc:postgresql://postgres:5432/smpp}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-smpp}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-smpp}
      SPRING_RABBITMQ_HOST: ${SPRING_RABBITMQ_HOST:-rabbitmq}
      SPRING_RABBITMQ_PORT: ${SPRING_RABBITMQ_PORT:-5672}
      SPRING_RABBITMQ_USERNAME: ${SPRING_RABBITMQ_USERNAME:-guest}
      SPRING_RABBITMQ_PASSWORD: ${SPRING_RABBITMQ_PASSWORD:-guest}
      SPRING_RABBITMQ_LISTENER_CONCURRENCY: ${SPRING_RABBITMQ_LISTENER_CONCURRENCY:-1}
      SPRING_RABBITMQ_LISTENER_PREFETCH: ${SPRING_RABBITMQ_LISTENER_PREFETCH:-10}
      MOCK_SENDER_BASE_URL: ${MOCK_SENDER_BASE_URL:-http://mock-sender:8080}
      MOCK_SENDER_PATH: ${MOCK_SENDER_PATH:-/send}
      MOCK_SENDER_MAX_ATTEMPTS: ${MOCK_SENDER_MAX_ATTEMPTS:-3}
      MOCK_SENDER_CONNECT_TIMEOUT_MS: ${MOCK_SENDER_CONNECT_TIMEOUT_MS:-5000}
      MOCK_SENDER_READ_TIMEOUT_MS: ${MOCK_SENDER_READ_TIMEOUT_MS:-10000}
      MANAGEMENT_OTLP_TRACING_ENDPOINT: ${MANAGEMENT_OTLP_TRACING_ENDPOINT:-http://jaeger:4318/v1/traces}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://jaeger:4318/v1/traces}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      mock-sender:
        condition: service_started
      jaeger:
        condition: service_started

  prometheus:
    image: prom/prometheus:v2.55.1
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    ports:
      - "9090:9090"
    volumes:
      - ../prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  grafana:
    image: grafana/grafana:11.4.0
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_HTTP_PORT: "3000"
    volumes:
      - ../grafana/provisioning:/etc/grafana/provisioning:ro
      - ../grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      prometheus:
        condition: service_started

  admin-dashboard:
    build:
      context: ../../frontend/admin-dashboard
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      app:
        condition: service_started

volumes:
  postgres_data:
