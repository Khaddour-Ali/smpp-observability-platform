spring:
  application:
    name: smpp-observability-platform
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/smpp}
    username: ${SPRING_DATASOURCE_USERNAME:smpp}
    password: ${SPRING_DATASOURCE_PASSWORD:smpp}
    hikari:
      maximum-pool-size: 10
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration

  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: ${SPRING_RABBITMQ_PORT:5672}
    username: ${SPRING_RABBITMQ_USERNAME:guest}
    password: ${SPRING_RABBITMQ_PASSWORD:guest}
    listener:
      simple:
        acknowledge-mode: manual
        concurrency: ${SPRING_RABBITMQ_LISTENER_CONCURRENCY:1}
        prefetch: ${SPRING_RABBITMQ_LISTENER_PREFETCH:10}

smpp:
  server:
    enabled: ${SMPP_SERVER_ENABLED:true}
    host: ${SMPP_SERVER_HOST:0.0.0.0}
    port: ${SMPP_SERVER_PORT:2775}
    max-connections: ${SMPP_SERVER_MAX_CONNECTIONS:256}
    io-threads: ${SMPP_SERVER_IO_THREADS:32}
    close-scheduler-threads: ${SMPP_SERVER_CLOSE_SCHEDULER_THREADS:1}
    system-id: ${SMPP_SERVER_SYSTEM_ID:SMPP}
    accept-any-bind: ${SMPP_SERVER_ACCEPT_ANY_BIND:true}
    expected-system-id: ${SMPP_SERVER_EXPECTED_SYSTEM_ID:}
    expected-password: ${SMPP_SERVER_EXPECTED_PASSWORD:}

  throttle:
    enabled: ${SMPP_THROTTLE_ENABLED:true}
    max-tps-per-system-id: ${SMPP_THROTTLE_MAX_TPS_PER_SYSTEM_ID:1000}

  queue:
    enabled: ${SMPP_QUEUE_ENABLED:true}
    exchange: ${SMPP_QUEUE_EXCHANGE:smpp.direct}
    queue: ${SMPP_QUEUE_NAME:smpp.messages.process}
    routing-key: ${SMPP_QUEUE_ROUTING_KEY:messages.process}
    dlx-exchange: ${SMPP_QUEUE_DLX_EXCHANGE:smpp.dlx}
    retry-routing-key: ${SMPP_QUEUE_RETRY_ROUTING_KEY:messages.process.retry}
    dlq-routing-key: ${SMPP_QUEUE_DLQ_ROUTING_KEY:messages.process.dlq}
    retry-queue: ${SMPP_QUEUE_RETRY_NAME:smpp.messages.process.retry}
    dlq-queue: ${SMPP_QUEUE_DLQ_NAME:smpp.messages.process.dlq}
    message-retry-ttl-ms: ${SMPP_QUEUE_MESSAGE_RETRY_TTL_MS:2000}
    handoff-interval-ms: ${SMPP_QUEUE_HANDOFF_INTERVAL_MS:500}
    batch-size: ${SMPP_QUEUE_BATCH_SIZE:50}

  mock-sender:
    base-url: ${MOCK_SENDER_BASE_URL:http://localhost:8081}
    path: ${MOCK_SENDER_PATH:/send}
    connect-timeout-ms: ${MOCK_SENDER_CONNECT_TIMEOUT_MS:5000}
    read-timeout-ms: ${MOCK_SENDER_READ_TIMEOUT_MS:10000}
    max-attempts: ${MOCK_SENDER_MAX_ATTEMPTS:3}

server:
  port: ${SERVER_PORT:8080}

management:
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${MANAGEMENT_OTLP_TRACING_ENDPOINT:${OTEL_EXPORTER_OTLP_ENDPOINT:http://127.0.0.1:4318/v1/traces}}
  endpoints:
    web:
      exposure:
        include: health,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
  health:
    db:
      enabled: true
    rabbit:
      enabled: ${SMPP_QUEUE_ENABLED:true}
